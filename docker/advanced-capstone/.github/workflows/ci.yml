name: Capstone CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd docker/advanced-capstone/app && npm ci

      - name: Lint
        run: cd docker/advanced-capstone/app && npm run lint

      - name: Test
        run: cd docker/advanced-capstone/app && npm test

  build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: docker/advanced-capstone/app
          push: false
          tags: capstone-app:latest
