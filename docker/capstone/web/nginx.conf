# Foundation Capstone — nginx configuration
# PROVIDED as a hint — you are free to use this directly or adapt it.
#
# This config does two things:
#   1. Serves static files (index.html) from /usr/share/nginx/html
#   2. Reverse-proxies /api/* and /health to the 'api' service on port 3000
#
# The reverse proxy is what makes the web container the single entry point:
# the browser never talks to the API directly — all requests go through nginx.
# This is the "api service not externally accessible" requirement from compose.yml.

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  server {
    listen 80;

    # Serve the static frontend
    location / {
      root  /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;
    }

    # Reverse proxy: /api/* forwarded to the API service
    # 'api' resolves via Docker's embedded DNS to the api service container
    location /api/ {
      proxy_pass         http://api:3000/api/;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Reverse proxy: /health forwarded to the API service
    location /health {
      proxy_pass         http://api:3000/health;
      proxy_set_header   Host $host;
    }
  }
}
