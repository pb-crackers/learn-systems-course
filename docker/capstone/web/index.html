<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foundation Capstone</title>
  <style>
    body { font-family: monospace; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.4rem; }
    #items { margin: 1rem 0; }
    .item { padding: 0.25rem 0; border-bottom: 1px solid #ddd; }
    form { display: flex; gap: 0.5rem; margin-top: 1rem; }
    input { flex: 1; padding: 0.4rem; font-family: monospace; }
    button { padding: 0.4rem 1rem; cursor: pointer; }
    #status { color: #666; font-size: 0.85rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <h1>Foundation Capstone</h1>
  <p>Items from the API (<code>/api/items</code>):</p>
  <div id="items">Loading...</div>
  <form id="add-form">
    <input id="name-input" type="text" placeholder="new item name" required />
    <button type="submit">Add</button>
  </form>
  <div id="status"></div>

  <script>
    const itemsEl = document.getElementById('items');
    const statusEl = document.getElementById('status');

    async function loadItems() {
      try {
        const res = await fetch('/api/items');
        const items = await res.json();
        itemsEl.innerHTML = items.length
          ? items.map(i => `<div class="item">${i.id}: ${i.name}</div>`).join('')
          : '<em>No items yet.</em>';
      } catch (err) {
        itemsEl.innerHTML = '<em>Error loading items — is the API running?</em>';
      }
    }

    document.getElementById('add-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name-input').value.trim();
      if (!name) return;
      try {
        const res = await fetch('/api/items', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name }),
        });
        if (res.ok) {
          document.getElementById('name-input').value = '';
          statusEl.textContent = `Added: ${name}`;
          await loadItems();
        } else {
          statusEl.textContent = `Error: ${res.status}`;
        }
      } catch (err) {
        statusEl.textContent = 'Request failed — check the API connection';
      }
    });

    loadItems();
  </script>
</body>
</html>
