events {
    worker_connections 1024;
}

http {
    # HTTP server on port 80
    server {
        listen 80;
        server_name _;

        # Default response — "Hello from Learn Systems"
        location / {
            default_type text/plain;
            return 200 "Hello from Learn Systems\n";
        }

        # JSON API endpoint for POST/GET testing
        location /api {
            default_type application/json;
            return 200 '{"service":"learn-systems","status":"ok","message":"HTTP lab API endpoint"}\n';
        }

        # Health check endpoint
        location /health {
            default_type application/json;
            return 200 '{"status":"healthy"}\n';
        }
    }
}
