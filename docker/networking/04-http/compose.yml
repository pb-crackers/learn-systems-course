services:
  webserver:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - lab-net
    command: ["nginx", "-g", "daemon off;"]
  client:
    build: ..
    depends_on: [webserver]
    volumes:
      - ./setup.sh:/setup.sh:ro
      - ./verify.sh:/verify/04-http.sh:ro
    networks:
      - lab-net
    command: sleep infinity
networks:
  lab-net:
    driver: bridge
